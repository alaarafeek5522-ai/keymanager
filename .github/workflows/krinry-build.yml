name: krinry Build

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type'
        required: true
        default: 'release'
        type: choice
        options: [debug, profile, release]
      output_type:
        description: 'Output type'
        required: true
        default: 'apk'
        type: choice
        options: [apk, appbundle, apk-split]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.0'
          channel: 'stable'

      - name: Pub get
        run: flutter pub get

      - name: Create android folder
        run: flutter create --platforms android --org com.alaa --project-name keymanager .

      - name: Add permissions to AndroidManifest
        run: |
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          sed -i 's/<application/<uses-permission android:name="android.permission.INTERNET"\/>\n    <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE"\/>\n    <application/' $MANIFEST

      - name: Set app label
        run: |
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          sed -i 's/android:label="[^"]*"/android:label="KeyManager"/' $MANIFEST

      - name: Build APK
        run: |
          TYPE="${{ github.event.inputs.build_type }}"
          OUT="${{ github.event.inputs.output_type }}"
          if [ "$OUT" = "apk" ]; then
            flutter build apk --$TYPE
          elif [ "$OUT" = "apk-split" ]; then
            flutter build apk --$TYPE --split-per-abi
          elif [ "$OUT" = "appbundle" ]; then
            flutter build appbundle --$TYPE
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: |
            build/app/outputs/flutter-apk/*.apk
            build/app/outputs/bundle/*/*.aab
          retention-days: 7
