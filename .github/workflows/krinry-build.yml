name: krinry Build

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type'
        required: true
        default: 'release'
        type: choice
        options: [debug, profile, release]
      output_type:
        description: 'Output type'
        required: true
        default: 'apk'
        type: choice
        options: [apk, appbundle, apk-split]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.0'
          channel: 'stable'

      - name: Pub get
        run: flutter pub get

      - name: Create android folder
        run: flutter create --platforms android --org com.alaa --project-name keymanager .

      - name: Add permissions to AndroidManifest
        run: |
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          sed -i 's/<application/<uses-permission android:name="android.permission.INTERNET"\/>\n    <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE"\/>\n    <application/' $MANIFEST

      - name: Set app label
        run: |
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          sed -i 's/android:label="[^"]*"/android:label="KeyManager"/' $MANIFEST

      - name: Generate app icon
        run: |
          sudo apt-get install -y imagemagick
          ICON_PATH="assets/images/app_icon.png"
          if [ -f "$ICON_PATH" ]; then
            for size in 48 72 96 144 192; do
              case $size in
                48)  folder="mipmap-mdpi" ;;
                72)  folder="mipmap-hdpi" ;;
                96)  folder="mipmap-xhdpi" ;;
                144) folder="mipmap-xxhdpi" ;;
                192) folder="mipmap-xxxhdpi" ;;
              esac
              mkdir -p android/app/src/main/res/$folder
              convert "$ICON_PATH" -resize ${size}x${size} android/app/src/main/res/$folder/ic_launcher.png
            done
            echo "✅ Icons generated from app_icon.png"
          else
            echo "❌ app_icon.png not found!"
            exit 1
          fi

      - name: Build APK
        run: |
          TYPE="${{ github.event.inputs.build_type }}"
          OUT="${{ github.event.inputs.output_type }}"
          if [ "$OUT" = "apk" ]; then
            flutter build apk --$TYPE
          elif [ "$OUT" = "apk-split" ]; then
            flutter build apk --$TYPE --split-per-abi
          elif [ "$OUT" = "appbundle" ]; then
            flutter build appbundle --$TYPE
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: |
            build/app/outputs/flutter-apk/*.apk
            build/app/outputs/bundle/*/*.aab
          retention-days: 7
